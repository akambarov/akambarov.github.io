<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 80%;
        margin: auto;
      }
      #result {
        margin-top: 20px;
        white-space: pre-wrap;
        background-color: #f9f9f9;
        padding: 10px;
        border: 1px solid #ddd;
      }
      textarea {
        width: 100%;
        height: 150px;
        padding: 10px;
        font-size: 14px;
        line-height: 1.4;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>???</h1>

    <label for="modelSelect">choose a model:</label>
    <select id="modelSelect">
      <option value="meta-llama/llama-4-scout-17b-16e-instruct">llama-4-scout-17b-16e-instruct</option>
      <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
    </select>

    <br><br>

    <textarea id="questionInput" placeholder="Enter your question"></textarea>
    <br>
    <button id="submitBtn">submit</button>
    <div id="result"></div>

    <script>
      document.getElementById('submitBtn').addEventListener('click', async function () {
        const inputElem = document.getElementById('questionInput');
        const question = inputElem.value.trim();
        if (question === '') {
          alert("please enter a question.");
          return;
        }

        const selectedModel = document.getElementById('modelSelect').value;
        const promptText = `${question}`;

        try {
          const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer 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"
            },
            body: JSON.stringify({
              model: selectedModel, 
              messages: [
                { role: "system", content: promptText }
              ],
              temperature: 0.7,
              max_completion_tokens: 8192
            })
          });

          if (!response.ok) {
            const errorDetails = await response.text();
            throw new Error(`Request failed: ${response.status} - ${errorDetails}`);
          }

          const data = await response.json();
          const answer = data.choices[0].message.content;

          document.getElementById("result").textContent = answer;
        } catch (error) {
          console.error("Error:", error);
          alert("An error occurred: " + error.message);
        }
      });
    </script>
  </body>
</html>
